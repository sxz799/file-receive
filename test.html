<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background: #f5f5f5;
            padding: 30px;
            border-radius: 8px;
        }
        h1 {
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .progress-container {
            margin-top: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007bff, #00d4ff);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>文件上传测试</h1>
        
        <div class="form-group">
            <label for="file">选择文件</label>
            <input type="file" id="file" />
        </div>
        
        <button id="uploadBtn" disabled>上传文件</button>
        
        <div class="progress-container" style="display: none;" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
            <div id="status" class="status info"></div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const status = document.getElementById('status');
        
        let eventSource = null;
        
        fileInput.addEventListener('change', () => {
            uploadBtn.disabled = !fileInput.files.length;
        });
        
        uploadBtn.addEventListener('click', async () => {
            if (!fileInput.files.length) return;
            
            const file = fileInput.files[0];
            progressContainer.style.display = 'block';
            uploadBtn.disabled = true;
            status.textContent = '连接进度服务器...';
            status.className = 'status info';
            
            // 连接 SSE
            eventSource = new EventSource('http://localhost:8080/upload/progress/sse');
            
            eventSource.addEventListener('progress', (event) => {
                const data = JSON.parse(event.data);
                const percent = Math.min(data.percent, 100);
                progressFill.style.width = percent + '%';
                progressFill.textContent = percent.toFixed(2) + '%';
                status.textContent = `正在上传: ${data.filename} (${formatBytes(data.current)} / ${formatBytes(data.total)})`;
            });
            
            eventSource.addEventListener('done', (event) => {
                const data = JSON.parse(event.data);
                progressFill.style.width = '100%';
                progressFill.textContent = '100%';
                status.textContent = `上传完成: ${data.filename}`;
                status.className = 'status success';
                eventSource.close();
                uploadBtn.disabled = false;
            });
            
            eventSource.onerror = (err) => {
                console.error('SSE 错误:', err);
                status.textContent = '连接错误，请检查服务是否启动';
                status.className = 'status error';
                if (eventSource) eventSource.close();
                uploadBtn.disabled = false;
            };
            
            // 开始上传
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('http://localhost:8080/upload/progress', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.error) {
                    status.textContent = result.error;
                    status.className = 'status error';
                } else {
                    status.textContent = result.message;
                    status.className = 'status success';
                }
            } catch (error) {
                status.textContent = `上传失败: ${error.message}`;
                status.className = 'status error';
            }
            
            uploadBtn.disabled = false;
        });
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>
